services:
  vllm:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
    command:
      - --model
      - ${VLLM_MODEL:-Qwen/Qwen3-32B-AWQ}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --tensor-parallel-size
      - ${VLLM_TP_SIZE:-2}
    ports:
      - "8000:8000"
    volumes:
      - ../../model-cache:/root/.cache/huggingface
