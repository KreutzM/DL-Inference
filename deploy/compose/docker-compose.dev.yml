services:
  gateway:
    build:
      context: ../..
      dockerfile: services/gateway/Dockerfile
    env_file: [../../.env]
    ports:
      - "8001:8001"
    volumes:
      - ../../services/gateway:/app/services/gateway
      - ../../configs:/app/configs:ro

  rag-api:
    build:
      context: ../..
      dockerfile: services/rag_api/Dockerfile
    env_file: [../../.env]
    ports:
      - "8010:8010"
    volumes:
      - ../../services/rag_api:/app/services/rag_api
      - ../../configs:/app/configs:ro
      - ../../knowledge:/app/knowledge
